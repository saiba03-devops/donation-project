{% load static %}

<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Payment</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>

    <div class="container text-center mt-5">

        <div class="card p-5 shadow">

            <h2>Complete Your Donation Payment</h2>

            <p class="mt-3">
                Donor Name: <strong>{{ donation.fullname }}</strong>
            </p>

            <p>
                Amount: <strong>₹{{ donation.amount }}</strong>
            </p>

            <button id="rzp-button1" class="btn btn-warning btn-lg mt-3">
                Pay Now
            </button>

        </div>

    </div>

    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

    <script>
        var options = {
            "key": "{{ razorpay_key }}",
            "amount": "{{ payment.amount }}",
            "currency": "INR",
            "name": "Donation",
            "description": "Child Donation Payment",
            "order_id": "{{ payment.id }}",
            "callback_url": "https://donation-project-znw9.onrender.com/payment-success/",
            "prefill": {
                "name": "{{ donation.fullname }}",
                "email": "{{ donation.email }}",
                "contact": "{{ donation.mobile }}"
            },

            "theme": {
                "color": "#ff6f0f"
            }
        };

        var rzp1 = new Razorpay(options);

        document.getElementById('rzp-button1').onclick = function (e) {
            rzp1.open();
            e.preventDefault();
        }
    </script>

</body>

</html>
